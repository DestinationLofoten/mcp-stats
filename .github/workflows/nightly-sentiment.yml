name: Nightly Lofoten Sentiment

on:
  schedule:
    # Runs at 03:00 UTC every night (05:00 Norwegian summer time)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Reddit mentions
        run: npm run fetch:reddit -- --days 2

      - name: Analyze sentiment
        run: npm run analyze:sentiment -- --limit 200
